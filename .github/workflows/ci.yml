name: ci

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Run the integration suite against a 3.x and a 4.x RabbitMQ image
        # to cover both major versions still in use.
        rabbitmq:
          - rabbitmq:3.13.7-management
          - rabbitmq:4.3.2-management
    name: build_and_test (${{ matrix.rabbitmq }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Build (netstandard2.1 + net8.0)
        run: dotnet build --configuration Release

      # Integration tests run against a real RabbitMQ broker via Testcontainers
      # (Docker is preinstalled on ubuntu-latest runners). RABBITMQ_IMAGE selects
      # the broker version the RabbitMqFixture spins up for this matrix leg.
      - name: Test
        env:
          RABBITMQ_IMAGE: ${{ matrix.rabbitmq }}
        run: dotnet test tests/EasyRabbitFlow.Tests --configuration Release --no-build --logger "console;verbosity=normal"
